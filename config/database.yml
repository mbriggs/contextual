# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000
  variables:
    statement_timeout: 5000
  # workaround for a long time bug
  <% if RUBY_PLATFORM =~ /darwin/ %>gssencmode: disable<% end %>

local: &local
  host: localhost
  port: 5432
  username: contextual
  password: contextual


development:
  <<: *default
  <<: *local
  database: contextual_dev

test:
  <<: *default
  <<: *local
  database: contextual_test

production:
  primary: &primary_production
    <<: *default
    database: contextual_production
    username: contextual
    password: <%= ENV["CONTEXTUAL_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: contextual_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: contextual_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: contextual_production_cable
    migrations_paths: db/cable_migrate
